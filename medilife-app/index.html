<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>Medilife Pathology — Trusted Diagnostic Lab Services</title>
    <meta name="description" content="Medilife Pathology Lab offers professional diagnostic services, home sample collection, CBC, LFT, KFT, thyroid tests and more. Book your test online and get reports fast." />
    <meta name="keywords" content="pathology lab, blood test, CBC, LFT, home collection, diagnostic center, medical reports" />
    <meta name="theme-color" content="#006574" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Medilife Pathology — Trusted Diagnostic Lab Services" />
    <meta property="og:description" content="Professional diagnostic services, home sample collection, and online reports. Book your test online today." />
    <meta property="og:site_name" content="Medilife Pathology" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Medilife Pathology" />
    <meta name="twitter:description" content="Professional diagnostic services with home collection and online reports." />

    <!-- Preconnect FIRST (before any font requests) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- DNS prefetch for third-party services -->
    <link rel="dns-prefetch" href="https://ylnorywjugrdxyzehvwc.supabase.co" />

    <!--
      NON-BLOCKING font loading using preload + onload swap trick.
      This eliminates the "render-blocking requests" PageSpeed penalty.
      Fonts load after first paint instead of blocking it.
    -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=optional"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <!-- Fallback for no-JS browsers -->
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=optional" />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
